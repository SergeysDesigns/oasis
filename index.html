    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));

    const entryId = templateData.entry;

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).

    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    }

      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };

      var i = h.indexOf(':');

    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.

        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });

      var gen = ++navGen;
      frame.onload = function() {

        // iframe may be cross-origin, and cw.* access would throw.

        var el = r.anchor && cw.document.getElementById(r.anchor);

ex; align-items:center; justify-content:space-between; padding:20px 48px; background:#FAF5EE; border-bottom:1px solid #E7DAC8;\">\n      <a href=\"\u002F\" aria-label=\"Oasis at Norterra — home\" style=\"display:inline-flex; align-items:center; text-decoration:none; color:inherit; cursor:pointer;\"><div style=\"display:flex; align-items:center; gap:13px;\">\n        <svg viewBox=\"0 0 48 48\" width=\"40\" height=\"40\" aria-hidden=\"true\">\n          <circle cx=\"24\" cy=\"24\" r=\"22\" fill=\"none\" stroke=\"#BC6B43\" stroke-width=\"1.6\"><\u002Fcircle>\n          <g fill=\"#BC6B43\">\n            <path d=\"M24,33 Q19,22 24,12 Q29,22 24,33 Z\" transform=\"rotate(-40 24 33)\"><\u002Fpath>\n            <path d=\"M24,33 Q19,22 24,12 Q29,22 24,33 Z\" transform=\"rotate(-20 24 33)\"><\u002Fpath>\n            <path d=\"M24,33 Q19,22 24,12 Q29,22 24,33 Z\"><\u002Fpath>\n            <path d=\"M24,33 Q19,22 24,12 Q29,22 24,33 Z\" transform=\"rotate(20 24 33)\"><\u002Fpath>\n            <path d=\"M24,33 Q19,22 24,12 Q29,22 24,33 Z\" transform=\"rotate(40 24 33)\"><\u002Fpath>\n          <\u002Fg>\n          <rect x=\"23.1\" y=\"32\" width=\"1.8\" height=\"7\" rx=\"0.9\" fill=\"#9A5232\"><\u002Frect>\n          <path d=\"M15 39 Q24 36 33 39\" fill=\"none\" stroke=\"#7C8A6E\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fpath>\n        <\u002Fsvg>\n        <div class=\"m-wordmark\" style=\"line-height:1.05;\">\n          <div class=\"m-brandname\" style=\"font-family:'Newsreader',serif; font-size:21px; font-weight:600; color:#3B3027; letter-spacing:.01em;\">Oasis at Norterra<\u002Fdiv>\n          <div class=\"m-subtitle\" style=\"font-size:10px; font-weight:700; letter-spacing:.22em; text-transform:uppercase; color:#BC6B43; margin-top:2px;\">Assisted Living<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv><\u002Fa>\n      <div class=\"m-tbright\" style=\"display:flex; align-items:center; gap:26px;\">\n        <div class=\"m-nav\" style=\"display:flex; gap:24px; font-size:14px; font-weight:600; color:#6E6256;\">\n          <a href=\"#care\" style=\"color:inherit; text-decoration:none;\">Our Care<\u002Fa><a href=\"#difference\" style=\"color:inherit; text-decoration:none;\">The Difference<\u002Fa><a href=\"#visit\" style=\"color:inherit; text-decoration:none;\">Visit<\u002Fa>\n        <\u002Fdiv>\n        <a href=\"tel:6024103388\" class=\"m-callbtn\" style=\"display:inline-flex; align-items:center; gap:8px; background:#BC6B43; color:#FFF; text-decoration:none; font-weight:700; font-size:14px; padding:12px 20px; border-radius:999px;\">\n          (602) 410-3388\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- hero -->\n    <div id=\"home\" style=\"position:relative; height:620px; overflow:hidden; scroll-margin-top:72px;\">\n      <img src=\"89df2fdc-5d20-4ece-b723-257ff63d80cb\" alt=\"Covered patio and courtyard at Oasis at Norterra\" style=\"width:100%; height:100%; object-fit:cover; display:block;\">\n      <div style=\"position:absolute; inset:0; background:linear-gradient(90deg, rgba(40,30,22,.78) 0%, rgba(40,30,22,.45) 45%, rgba(40,30,22,.05) 100%);\"><\u002Fdiv>\n      <div class=\"m-hero-inner\" style=\"position:absolute; inset:0; display:flex; flex-direction:column; justify-content:center; padding:0 64px; max-width:720px;\">\n        <div style=\"display:inline-flex; align-items:center; gap:9px; align-self:flex-start; background:rgba(250,245,238,.16); border:1px solid rgba(250,245,238,.4); backdrop-filter:blur(2px); color:#FBEFE0; font-size:12px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; padding:8px 15px; border-radius:999px; margin-bottom:26px;\">\n          A licensed assisted living home · North Phoenix\n        <\u002Fdiv>\n        <h1 style=\"font-family:'Newsreader',serif; font-weight:500; font-size:62px; line-height:1.04; color:#FFF; margin:0 0 22px; letter-spacing:-.01em;\">The care of family.<br>The comfort of home.<\u002Fh1>\n        <p style=\"font-size:19px; line-height:1.6; color:#F2E7D8; margin:0 0 34px; max-width:540px;\">A small, beautiful residential home in Norterra where just ten residents are looked after around the clock, the way you would care for your own mother or father.<\u002Fp>\n        <div class=\"m-hero-cta\" style=\"display:flex; align-items:center; gap:18px;\">\n          <a href=\"tel:6024103388\" style=\"display:inline-flex; align-items:center; gap:10px; background:#BC6B43; color:#FFF; text-decoration:none; font-weight:700; font-size:17px; padding:17px 30px; border-radius:999px;\">\n            <span style=\"font-size:18px;\">☎<\u002Fspan> Call to schedule a visit\n          <\u002Fa>\n          <span style=\"color:#F2E7D8; font-size:15px; font-weight:600;\">Reach out today, we're here to help your family<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- trust strip -->\n    <div class=\"m-trust\" style=\"display:grid; grid-template-columns:repeat(4,1fr); background:#3B3027; color:#F2E7D8;\">\n      <div style=\"padding:26px 30px; border-right:1px solid rgba(242,231,216,.14);\">\n        <div style=\"font-family:'Newsreader',serif; font-size:30px; color:#E8A878; line-height:1;\">10<\u002Fdiv>\n        <div style=\"font-size:13px; font-weight:600; margin-top:7px; color:#D8C6B4;\">residents, never a crowd<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:26px 30px; border-right:1px solid rgba(242,231,216,.14);\">\n        <div style=\"font-family:'Newsreader',serif; font-size:30px; color:#E8A878; line-height:1;\">24\u002F7<\u002Fdiv>\n        <div style=\"font-size:13px; font-weight:600; margin-top:7px; color:#D8C6B4;\">on-site caregivers<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:26px 30px; border-right:1px solid rgba(242,231,216,.14);\">\n        <div style=\"font-family:'Newsreader',serif; font-size:30px; color:#E8A878; line-height:1;\">Hands-on<\u002Fdiv>\n        <div style=\"font-size:13px; font-weight:600; margin-top:7px; color:#D8C6B4;\">an owner who is personally involved<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:26px 30px;\">\n        <div style=\"font-family:'Newsreader',serif; font-size:30px; color:#E8A878; line-height:1;\">3<\u002Fdiv>\n        <div style=\"font-size:13px; font-weight:600; margin-top:7px; color:#D8C6B4;\">home-cooked meals a day<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- intro: not a facility -->\n    <div class=\"m-2col\" style=\"padding:88px 64px; display:grid; grid-template-columns:1fr 1fr; gap:64px; align-items:center;\">\n      <div>\n        <div style=\"font-size:13px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:#BC6B43; margin-bottom:18px;\">Not a facility. A home.<\u002Fdiv>\n        <h2 style=\"font-family:'Newsreader',serif; font-weight:500; font-size:42px; line-height:1.12; margin:0 0 22px; color:#3B3027;\">When the place feels like home, everything else gets easier.<\u002Fh2>\n        <p style=\"font-size:17px; line-height:1.72; color:#6E6256; margin:0 0 18px;\">Choosing care for your mom or dad is one of the hardest decisions a family makes. Oasis at Norterra was built to make it a little less daunting. It is a real house on a quiet North Phoenix street, not a wing at the end of a long corridor.<\u002Fp>\n        <p style=\"font-size:17px; line-height:1.72; color:#6E6256; margin:0;\">Bright, spotless, and airy, with a peaceful courtyard and rooms that feel lived-in and loved. Your parent settles in. You exhale.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"m-collage\" style=\"display:grid; grid-template-columns:1fr 1fr; gap:16px;\">\n        <img src=\"e2656a16-387b-41c4-b667-1fe9ee2a3622\" alt=\"Bright open great room\" style=\"width:100%; height:300px; object-fit:cover; border-radius:3px; grid-column:1 \u002F 3;\">\n        <img src=\"e275d16a-9619-49de-9625-0f582fb9c60c\" alt=\"Sunlit hallway\" style=\"width:100%; height:210px; object-fit:cover; border-radius:3px;\">\n        <img src=\"149e2b9a-5ee4-41e7-8745-b7832d4b47ea\" alt=\"Vanity area\" style=\"width:100%; height:210px; object-fit:cover; border-radius:3px;\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- care & services -->\n    <div id=\"care\" style=\"background:#F0E6D8; padding:84px 64px; scroll-margin-top:72px;\">\n      <div style=\"text-align:center; max-width:640px; margin:0 auto 52px;\">\n        <div style=\"font-size:13px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:#BC6B43; margin-bottom:16px;\">Everything your parent needs<\u002Fdiv>\n        <h2 style=\"font-family:'Newsreader',serif; font-weight:500; font-size:40px; line-height:1.12; margin:0; color:#3B3027;\">Attentive care, woven into an ordinary good day.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"m-cards\" style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:22px;\">\n        <div style=\"background:#FAF5EE; border-radius:4px; padding:32px 30px;\">\n          <div style=\"width:48px; height:48px; border-radius:999px; background:#F0E6D8; display:flex; align-items:center; justify-content:center; margin-bottom:18px;\">\n            <svg viewBox=\"0 0 24 24\" width=\"24\" height=\"24\" fill=\"none\" stroke=\"#BC6B43\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 20s-6.5-4.2-8.6-8.3C1.7 8.4 3.2 5.5 6.2 5.5c1.9 0 3 1.3 3.8 2.4C10.8 6.8 11.9 5.5 13.8 5.5c3 0 4.5 2.9 2.8 6.2C14.5 15.8 12 20 12 20Z\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <h3 style=\"font-family:'Newsreader',serif; font-weight:600; font-size:21px; margin:0 0 9px; color:#3B3027;\">24\u002F7 Personal Care<\u002Fh3>\n          <p style=\"font-size:15px; line-height:1.6; color:#6E6256; margin:0;\">Awake caregivers, day and night, helping with bathing, dressing, and everything in between, with dignity.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FAF5EE; border-radius:4px; padding:32px 30px;\">\n          <div style=\"width:48px; height:48px; border-radius:999px; background:#F0E6D8; display:flex; align-items:center; justify-content:center; margin-bottom:18px;\">\n            <svg viewBox=\"0 0 24 24\" width=\"24\" height=\"24\" fill=\"none\" stroke=\"#BC6B43\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4.6 14.4 14.4 4.6a4.1 4.1 0 0 1 5.8 5.8l-9.8 9.8a4.1 4.1 0 0 1-5.8-5.8Z\"><\u002Fpath><path d=\"m9.5 9.5 5 5\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <h3 style=\"font-family:'Newsreader',serif; font-weight:600; font-size:21px; margin:0 0 9px; color:#3B3027;\">Medication Management<\u002Fh3>\n          <p style=\"font-size:15px; line-height:1.6; color:#6E6256; margin:0;\">Medications organized, given on time, and coordinated directly with your parent's doctors and pharmacy.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FAF5EE; border-radius:4px; padding:32px 30px;\">\n          <div style=\"width:48px; height:48px; border-radius:999px; background:#F0E6D8; display:flex; align-items:center; justify-content:center; margin-bottom:18px;\">\n            <svg viewBox=\"0 0 24 24\" width=\"24\" height=\"24\" fill=\"none\" stroke=\"#BC6B43\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3.5 17.5a8.5 8.5 0 0 1 17 0Z\"><\u002Fpath><line x1=\"2.5\" y1=\"17.5\" x2=\"21.5\" y2=\"17.5\"><\u002Fline><line x1=\"12\" y1=\"9\" x2=\"12\" y2=\"6.5\"><\u002Fline><\u002Fsvg>\n          <\u002Fdiv>\n          <h3 style=\"font-family:'Newsreader',serif; font-weight:600; font-size:21px; margin:0 0 9px; color:#3B3027;\">Three Home-Cooked Meals<\u002Fh3>\n          <p style=\"font-size:15px; line-height:1.6; color:#6E6256; margin:0;\">Fresh, nutritious meals each day, made to suit special diets, and shared around a real table.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FAF5EE; border-radius:4px; padding:32px 30px;\">\n          <div style=\"width:48px; height:48px; border-radius:999px; background:#F0E6D8; display:flex; align-items:center; justify-content:center; margin-bottom:18px;\">\n            <svg viewBox=\"0 0 24 24\" width=\"24\" height=\"24\" fill=\"none\" stroke=\"#BC6B43\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3 20 6v5c0 4.8-3.4 8-8 10-4.6-2-8-5.2-8-10V6Z\"><\u002Fpath><path d=\"m8.7 11.8 2.2 2.2 4.4-4.4\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <h3 style=\"font-family:'Newsreader',serif; font-weight:600; font-size:21px; margin:0 0 9px; color:#3B3027;\">Safe, ADA-Equipped Suites<\u002Fh3>\n          <p style=\"font-size:15px; line-height:1.6; color:#6E6256; margin:0;\">Roll-in showers, grab bars, and zero-step bathrooms throughout, designed to prevent the fall before it happens.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FAF5EE; border-radius:4px; padding:32px 30px;\">\n          <div style=\"width:48px; height:48px; border-radius:999px; background:#F0E6D8; display:flex; align-items:center; justify-content:center; margin-bottom:18px;\">\n            <svg viewBox=\"0 0 24 24\" width=\"24\" height=\"24\" fill=\"none\" stroke=\"#BC6B43\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9 17V5l11-2v12\"><\u002Fpath><circle cx=\"6\" cy=\"17\" r=\"3\"><\u002Fcircle><circle cx=\"17\" cy=\"15\" r=\"3\"><\u002Fcircle><\u002Fsvg>\n          <\u002Fdiv>\n          <h3 style=\"font-family:'Newsreader',serif; font-weight:600; font-size:21px; margin:0 0 9px; color:#3B3027;\">Activities &amp; Companionship<\u002Fh3>\n          <p style=\"font-size:15px; line-height:1.6; color:#6E6256; margin:0;\">Music, games, time in the courtyard, and the simple company that keeps a person engaged and themselves.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FAF5EE; border-radius:4px; padding:32px 30px;\">\n          <div style=\"width:48px; height:48px; border-radius:999px; background:#F0E6D8; display:flex; align-items:center; justify-content:center; margin-bottom:18px;\">\n            <svg viewBox=\"0 0 24 24\" width=\"24\" height=\"24\" fill=\"none\" stroke=\"#BC6B43\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"5\" y=\"4\" width=\"14\" height=\"17\" rx=\"2\"><\u002Frect><path d=\"M9 4.5h6V7a1 1 0 0 1-1 1h-4a1 1 0 0 1-1-1Z\"><\u002Fpath><path d=\"m8.8 13 2 2 4-4\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <h3 style=\"font-family:'Newsreader',serif; font-weight:600; font-size:21px; margin:0 0 9px; color:#3B3027;\">Care Coordination<\u002Fh3>\n          <p style=\"font-size:15px; line-height:1.6; color:#6E6256; margin:0;\">Specialized support including ALS care, plus proactive updates so the family is never left wondering.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- the difference \u002F owner -->\n    <div id=\"difference\" style=\"padding:88px 64px; display:grid; grid-template-columns:1.05fr .95fr; gap:60px; align-items:center; scroll-margin-top:72px;\">\n      <div class=\"m-collage\" style=\"display:grid; grid-template-columns:1fr 1fr; gap:16px;\">\n        <img src=\"76277511-d7b1-4f17-9220-064bbf8d07cc\" alt=\"Resident bedroom\" style=\"width:100%; height:340px; object-fit:cover; border-radius:3px;\">\n        <img src=\"39143847-0db1-4dca-922a-6829eb71e512\" alt=\"Resident bedroom\" style=\"width:100%; height:340px; object-fit:cover; border-radius:3px; margin-top:34px;\">\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:13px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:#BC6B43; margin-bottom:18px;\">The Oasis difference<\u002Fdiv>\n        <h2 style=\"font-family:'Newsreader',serif; font-weight:500; font-size:38px; line-height:1.14; margin:0 0 22px; color:#3B3027;\">A hands-on owner, not a corporate office a state away.<\u002Fh2>\n        <p style=\"font-size:17px; line-height:1.72; color:#6E6256; margin:0 0 26px;\">At big communities, your loved one is one of two hundred. Here, they are one of ten. Ben and the team know every resident by name, notice the small changes that matter, and respond before you have to ask.<\u002Fp>\n        <div style=\"display:flex; flex-direction:column; gap:14px;\">\n          <div style=\"display:flex; gap:13px; align-items:flex-start;\"><span style=\"color:#BC6B43; font-size:18px; line-height:1.4;\">✓<\u002Fspan><span style=\"font-size:16px; color:#3B3027; line-height:1.5;\">A high caregiver-to-resident ratio, every shift<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:13px; align-items:flex-start;\"><span style=\"color:#BC6B43; font-size:18px; line-height:1.4;\">✓<\u002Fspan><span style=\"font-size:16px; color:#3B3027; line-height:1.5;\">Compassionate, professional, genuinely responsive staff<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:13px; align-items:flex-start;\"><span style=\"color:#BC6B43; font-size:18px; line-height:1.4;\">✓<\u002Fspan><span style=\"font-size:16px; color:#3B3027; line-height:1.5;\">Family-run. Treated like family, because you are<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- testimonial -->\n    <div class=\"m-testimonial\" style=\"background:#3B3027; padding:84px 64px; text-align:center;\">\n      <div style=\"color:#E8A878; font-size:54px; font-family:'Newsreader',serif; line-height:0; height:30px;\">“<\u002Fdiv>\n      <p class=\"m-quote\" style=\"font-family:'Newsreader',serif; font-weight:400; font-style:italic; font-size:31px; line-height:1.42; color:#FBEFE0; max-width:880px; margin:0 auto 30px;\">My mom felt safe, comfortable, and truly cared for. The home is beautiful and spotless, the staff is compassionate and responsive, and they keep us updated every step of the way. A first-class, family-run place.<\u002Fp>\n      <div style=\"font-size:14px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:#D8A878;\">Daughter of a resident<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- final CTA -->\n    <div id=
